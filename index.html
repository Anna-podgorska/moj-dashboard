<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Histogram czasów realizacji</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    .nav-bar {
      width: 100%;
      max-width: 860px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .nav-bar a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      border-radius: 99px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    .nav-bar a.active {
      background: #6b46c1;
      color: #fff;
    }
    .nav-bar a:not(.active) {
      background: #e0f2fe;
      color: #0369a1;
      border: 1.5px solid #bae6fd;
    }
    .nav-bar a:not(.active):hover {
      background: #0ea5e9;
      color: #fff;
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f5f7fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      min-height: 100vh;
      gap: 32px;
    }
    h1 {
      font-size: 1.5rem;
      color: #2d3748;
      margin-bottom: 24px;
      text-align: center;
    }
    h2 {
      font-size: 1.2rem;
      color: #2d3748;
      margin-bottom: 16px;
    }
    .chart-wrapper {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      padding: 28px 24px 16px;
      width: 100%;
      max-width: 860px;
    }
    .legend-extra {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      margin-top: 16px;
      font-size: 0.85rem;
      color: #4a5568;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-line {
      width: 28px;
      height: 3px;
      border-top: 3px dashed;
    }

    /* ── Strategic tasks section ── */
    .strategic-wrapper {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      padding: 28px 24px 24px;
      width: 100%;
      max-width: 860px;
      border-top: 4px solid #6b46c1;
    }
    .strategic-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #6b46c1;
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-radius: 99px;
      padding: 3px 10px;
      margin-bottom: 16px;
    }
    .strategic-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      flex: 1 1 120px;
      background: #f3eeff;
      border-radius: 8px;
      padding: 12px 16px;
      text-align: center;
    }
    .stat-card .stat-label {
      font-size: 0.75rem;
      color: #6b46c1;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .stat-card .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #44337a;
    }
    .stat-card .stat-unit {
      font-size: 0.75rem;
      color: #6b46c1;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    thead tr {
      background: #6b46c1;
      color: #fff;
    }
    thead th {
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
    }
    tbody tr:nth-child(even) { background: #f9f5ff; }
    tbody tr:hover { background: #ede9fe; }
    tbody td {
      padding: 9px 14px;
      color: #2d3748;
      border-bottom: 1px solid #e9d8fd;
    }
    .bar-cell {
      min-width: 160px;
    }
    .bar-bg {
      background: #e9d8fd;
      border-radius: 4px;
      height: 10px;
      overflow: hidden;
    }
    .bar-fill {
      background: #6b46c1;
      height: 10px;
      border-radius: 4px;
    }
    .percentile-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 99px;
      margin-left: 6px;
      color: #fff;
    }
  </style>
</head>
<body>
  <nav class="nav-bar">
    <a href="index.html" class="active">📊 Histogram czasów realizacji</a>
    <a href="anna-podgorska.html">☁ Scatterplot czasów realizacji</a>
  </nav>
  <h1>Histogram czasów realizacji</h1>
  <div class="chart-wrapper">
    <canvas id="histChart"></canvas>
    <div class="legend-extra">
      <span class="legend-item">
        <span class="legend-line" style="border-color:#e53e3e;"></span>P50
      </span>
      <span class="legend-item">
        <span class="legend-line" style="border-color:#dd6b20;"></span>P80
      </span>
      <span class="legend-item">
        <span class="legend-line" style="border-color:#805ad5;"></span>P95
      </span>
    </div>
  </div>

  <!-- ── Strategic (L) tasks section ── -->
  <div class="strategic-wrapper">
    <span class="strategic-badge">⭐ Zadania strategiczne (wycena L)</span>
    <h2>Czasy realizacji — zadania strategiczne</h2>
    <div class="strategic-stats" id="strategicStats"></div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Data ukończenia</th>
          <th>Czas realizacji (dni)</th>
          <th class="bar-cell">Wizualizacja</th>
        </tr>
      </thead>
      <tbody id="strategicTable"></tbody>
    </table>
  </div>

  <script>
    // ── raw data from "2. Scatterplot czasów realizacji.csv" ──────────────
    const rawData = [
      {date:'15.07.2024', size:'S', value:49},
      {date:'22.08.2024', size:'S', value:48},
      {date:'10.09.2024', size:'S', value:87},
      {date:'25.09.2024', size:'M', value:57},
      {date:'5.10.2024',  size:'M', value:148},
      {date:'14.10.2024', size:'S', value:53},
      {date:'28.10.2024', size:'S', value:45},
      {date:'18.11.2024', size:'M', value:145},
      {date:'4.12.2024',  size:'L', value:105},
      {date:'8.01.2025',  size:'S', value:5},
      {date:'20.01.2025', size:'L', value:163},
      {date:'14.02.2025', size:'S', value:43},
      {date:'26.02.2025', size:'M', value:415},
      {date:'15.03.2025', size:'L', value:123},
      {date:'10.04.2025', size:'M', value:103},
      {date:'5.05.2025',  size:'L', value:104},
      {date:'12.06.2025', size:'L', value:302},
      {date:'25.06.2025', size:'L', value:158},
      {date:'2.07.2025',  size:'L', value:98},
      {date:'11.07.2025', size:'S', value:52},
      {date:'18.07.2025', size:'M', value:95},
      {date:'29.07.2025', size:'S', value:70},
      {date:'3.08.2025',  size:'M', value:95},
      {date:'14.08.2025', size:'M', value:101},
      {date:'21.08.2025', size:'M', value:57},
      {date:'29.08.2025', size:'M', value:57},
      {date:'8.09.2025',  size:'S', value:53},
      {date:'22.09.2025', size:'L', value:137},
      {date:'4.10.2025',  size:'S', value:73},
      {date:'12.10.2025', size:'M', value:60},
      {date:'19.10.2025', size:'S', value:126},
      {date:'27.10.2025', size:'M', value:57},
      {date:'5.11.2025',  size:'L', value:124},
      {date:'15.11.2025', size:'M', value:75},
      {date:'25.11.2025', size:'M', value:89},
      {date:'10.12.2025', size:'S', value:44},
    ];

    // ── percentile helper (linear interpolation) ───────────────────────────
    function calcPercentile(arr, p) {
      const sorted = [...arr].sort((a, b) => a - b);
      const pos = (p / 100) * (sorted.length - 1);
      const lo = Math.floor(pos);
      const hi = Math.ceil(pos);
      if (lo === hi) return sorted[lo];
      return sorted[lo] + (pos - lo) * (sorted[hi] - sorted[lo]);
    }

    const allValues = rawData.map(d => d.value);
    const p50 = calcPercentile(allValues, 50);
    const p80 = calcPercentile(allValues, 80);
    const p95 = calcPercentile(allValues, 95);

    // ── strategic (L) tasks ────────────────────────────────────────────────
    const strategicTasks = rawData.filter(d => d.size === 'L');
    const lValues = strategicTasks.map(d => d.value);
    const lP50 = calcPercentile(lValues, 50);
    const lP80 = calcPercentile(lValues, 80);
    const lP95 = calcPercentile(lValues, 95);
    const lMax = Math.max(...lValues);

    // ── populate strategic stats cards ────────────────────────────────────
    const statsContainer = document.getElementById('strategicStats');
    [
      { label: 'Liczba zadań', value: lValues.length, unit: '' },
      { label: 'P50', value: Math.round(lP50), unit: 'dni' },
      { label: 'P80', value: Math.round(lP80), unit: 'dni' },
      { label: 'P95', value: Math.round(lP95), unit: 'dni' },
    ].forEach(s => {
      statsContainer.innerHTML += `
        <div class="stat-card">
          <div class="stat-label">${s.label}</div>
          <div class="stat-value">${s.value}<span class="stat-unit"> ${s.unit}</span></div>
        </div>`;
    });

    // ── populate strategic table ───────────────────────────────────────────
    function percentileTag(v) {
      if (v <= lP50) return `<span class="percentile-tag" style="background:#38a169">≤P50</span>`;
      if (v <= lP80) return `<span class="percentile-tag" style="background:#dd6b20">≤P80</span>`;
      if (v <= lP95) return `<span class="percentile-tag" style="background:#805ad5">≤P95</span>`;
      return `<span class="percentile-tag" style="background:#e53e3e">&gt;P95</span>`;
    }

    const tbody = document.getElementById('strategicTable');
    strategicTasks.forEach((task, i) => {
      const pct = Math.round((task.value / lMax) * 100);
      tbody.innerHTML += `
        <tr>
          <td>${i + 1}</td>
          <td>${task.date}</td>
          <td>${task.value} dni ${percentileTag(task.value)}</td>
          <td class="bar-cell">
            <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
          </td>
        </tr>`;
    });

    // ── build bins (width = 30 days) ───────────────────────────────────────
    const BIN_WIDTH = 30;
    const maxVal = Math.max(...allValues);
    const numBins = Math.ceil((maxVal + 1) / BIN_WIDTH);

    const binLabels = [];
    for (let i = 0; i < numBins; i++) {
      binLabels.push(`${i * BIN_WIDTH}–${(i + 1) * BIN_WIDTH}`);
    }

    const sizes = ['S', 'M', 'L'];
    const counts = {};
    sizes.forEach(s => { counts[s] = new Array(numBins).fill(0); });

    rawData.forEach(d => {
      const idx = Math.floor(d.value / BIN_WIDTH);
      counts[d.size][idx]++;
    });

    // ── map a percentile value to a fractional bar-index position ──────────
    // Bar index i covers the range [i*BIN_WIDTH, (i+1)*BIN_WIDTH).
    // Chart.js places bar i centred at x = i, so x = value/BIN_WIDTH - 0.5.
    function valueToX(v) {
      return v / BIN_WIDTH - 0.5;
    }

    // ── colours for each size ──────────────────────────────────────────────
    const sizeColors = {
      S: 'rgba(72, 187, 120, 0.85)',   // green
      M: 'rgba(66, 153, 225, 0.85)',   // blue
      L: 'rgba(107, 70, 193, 0.85)',   // purple – strategic
    };
    const sizeBorder = {
      S: 'rgba(47, 133, 90, 1)',
      M: 'rgba(43, 108, 176, 1)',
      L: 'rgba(68, 51, 122, 1)',       // dark purple
    };
    const sizeLabels = {
      S: 'Rozmiar S',
      M: 'Rozmiar M',
      L: '⭐ Strategiczne (L)',
    };

    // ── Chart.js datasets ──────────────────────────────────────────────────
    const datasets = sizes.map(s => ({
      label: sizeLabels[s],
      data: counts[s],
      backgroundColor: sizeColors[s],
      borderColor: sizeBorder[s],
      borderWidth: 1,
    }));

    // ── annotation lines for percentiles ──────────────────────────────────
    function percentileAnnotation(value, label, color) {
      return {
        type: 'line',
        scaleID: 'x',
        value: valueToX(value),
        borderColor: color,
        borderWidth: 2.5,
        borderDash: [6, 4],
        label: {
          display: true,
          content: `${label}: ${Math.round(value)} dni`,
          position: 'start',
          color: '#fff',
          backgroundColor: color,
          font: { size: 11, weight: 'bold' },
          padding: { x: 6, y: 4 },
          yAdjust: -6,
        },
      };
    }

    const annotations = {
      p50line: percentileAnnotation(p50, 'P50', '#e53e3e'),
      p80line: percentileAnnotation(p80, 'P80', '#dd6b20'),
      p95line: percentileAnnotation(p95, 'P95', '#805ad5'),
    };

    // ── render chart ───────────────────────────────────────────────────────
    const ctx = document.getElementById('histChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: { labels: binLabels, datasets },
      options: {
        plugins: {
          legend: { position: 'top' },
          annotation: { annotations },
          tooltip: {
            callbacks: {
              title: items => `Czas realizacji: ${items[0].label} dni`,
              label: item => ` ${item.dataset.label}: ${item.raw}`,
            },
          },
        },
        scales: {
          x: {
            stacked: true,
            title: { display: true, text: 'Czas realizacji (dni)', font: { size: 13 } },
          },
          y: {
            stacked: true,
            beginAtZero: true,
            ticks: { stepSize: 1, precision: 0 },
            title: { display: true, text: 'Liczba zadań', font: { size: 13 } },
          },
        },
        responsive: true,
        maintainAspectRatio: true,
      },
    });
  </script>
</body>
</html>
